
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNexis</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#fff}
header{padding:20px;background:#111827;text-align:center}
.container{padding:20px}
.card{background:#1f2937;padding:15px;margin:10px 0;border-radius:10px}
button{padding:10px 15px;border:1px solid #fff;background:transparent;color:#fff;border-radius:8px;cursor:pointer}
button:hover{background:#fff;color:#000}
</style>
</head>
<body>

<header>
<h1>TechNexis</h1>
<p>AI Tools + Tech Blog</p>
</header>

<div class="container">
<h2>Latest Articles</h2>
<div id="articles"></div>
</div>

<script>
async function loadSite(){
  let res = await fetch("/api/site");
  let data = await res.json();
  document.title = data.name;
}

async function loadArticles(){
  let res = await fetch("/api/articles");
  let data = await res.json();

  let html = "";
  data.forEach(a=>{
    html += `
      <div class="card">
        <h3>${a.title}</h3>
        <p>${a.content}</p>
        <small>${a.category}</small>
      </div>
    `;
  });

  document.getElementById("articles").innerHTML = html;
}

loadSite();
loadArticles();
</script>

</body>
</html>
