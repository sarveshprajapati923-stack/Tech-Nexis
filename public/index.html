<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Mart Website</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f7f7f7;
  color:#222;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
  position:sticky;
  top:0;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.logo{
  font-size:20px;
  font-weight:bold;
}

.nav-btn{
  border:2px solid #222;
  background:transparent;
  padding:8px 15px;
  cursor:pointer;
  transition:0.3s;
}

.nav-btn:hover{
  background:#222;
  color:white;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
  background:white;
}

.hero h1{
  font-size:28px;
  margin-bottom:10px;
}

.hero p{
  color:gray;
}

/* BUTTON */
.btn{
  margin-top:15px;
  border:2px solid #222;
  background:transparent;
  padding:10px 20px;
  cursor:pointer;
  transition:0.3s;
  border-radius:8px;
}

.btn:hover{
  background:#222;
  color:white;
  transform:scale(1.05);
}

/* PRODUCTS */
.section{
  padding:30px 20px;
}

.section h2{
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* WHATSAPP BUTTON */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px 15px;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:white;
  margin-top:20px;
  color:gray;
}

</style>
</head>

<body>

<nav>
  <div class="logo">Mini Mart</div>
  <button class="nav-btn">Contact</button>
</nav>

<div class="hero">
  <h1>Welcome to Your Local Mini Mart</h1>
  <p>Fresh groceries & daily essentials available</p>
  <button class="btn">Shop Now</button>
</div>

<div class="section">
  <h2>Products</h2>
  <div class="grid">
    <div class="card">Rice</div>
    <div class="card">Oil</div>
    <div class="card">Sugar</div>
    <div class="card">Snacks</div>
    <div class="card">Soap</div>
    <div class="card">Milk</div>
  </div>
</div>

<div class="section">
  <h2>About Shop</h2>
  <p>We provide daily essential items at best price in your local area.</p>
</div>

<footer>
  © 2026 Mini Mart. All rights reserved.
</footer>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">
  WhatsApp Order
</a>

</body>
  </html>
