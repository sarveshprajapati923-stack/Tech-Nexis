<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact TechNexis." />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <title>Contact Us — TechNexis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/"><img src="/assets/logo.svg" alt="TechNexis logo"><span>TechNexis</span></a>
      <nav class="nav">
        <a href="/">Home</a><a href="/blog.html">Blog</a><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/privacy-policy.html">Privacy</a>
      </nav>
    </header>
    <main class="panel article">
      <div class="badge">Contact Us</div>
      <h1>Send us a message</h1>
      <p>Use this form for feedback, corrections, partnership requests, or support questions.</p>
      <form class="form" data-contact-form>
        <input class="field" name="name" placeholder="Your name" required>
        <input class="field" name="email" type="email" placeholder="Your email" required>
        <textarea class="field" name="message" rows="6" placeholder="Your message" required></textarea>
        <button class="btn" type="submit">Send Message</button>
      </form>
    </main>
    <footer class="footer"><span>© <span id="year"></span> TechNexis</span><a href="/">Home</a></footer>
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
